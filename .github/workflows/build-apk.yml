name: Build Android APK

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev ccache

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          # Закреплённая связка: p4a 2024.1.21 собирает Python 3.11 (под него
          # компилируется Kivy 2.3.0). Свежий p4a тянет Python 3.13 и ломает сборку.
          pip install Cython==0.29.36 buildozer==1.5.0 python-for-android==2024.1.21
          echo "=== Версии ==="
          buildozer --version || true
          python -c "import pythonforandroid, sys; print('p4a', pythonforandroid.__version__)"

      - name: Build debug APK
        working-directory: android
        run: yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: woordle-apk
          path: android/bin/*.apk
